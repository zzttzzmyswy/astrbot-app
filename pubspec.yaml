name: astrbot_app
description: AstrBot Android Chat Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_chat_ui: ^2.11.0
  flutter_chat_core: ^2.0.0
  flutter_riverpod: ^2.5.0
  web_socket_channel: ^3.0.0
  http: ^1.2.0
  sqflite: ^2.3.0
  shared_preferences: ^2.3.0
  connectivity_plus: ^6.0.0
  image_picker: ^1.0.0
  record: ^6.0.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  file_picker: ^8.0.0
  cached_network_image: ^3.3.0
  flutter_markdown: ^0.7.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  flutter_foreground_task: ^8.10.0
  dio: ^5.7.0
  http_parser: ^4.1.0
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
