name: build-windows

# 桌面单文件:windows-latest runner 构建,用 NSIS 打成自解压 exe(双击静默解压到
# %TEMP%\astrbot_app 并启动 astrbot_app.exe)。产物 astrbot-windows.exe 挂 release。
# tag(v*)推送时:tag 名即 release tag。workflow_dispatch:手动指定 release tag。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '要挂载 Windows exe 的 release tag'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.6'
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Write NSIS self-extractor script
        shell: pwsh
        run: |
          @'
          !define APPNAME "AstrBot"
          Name "${APPNAME}"
          OutFile "astrbot-windows.exe"
          RequestExecutionLevel user
          ShowInstDetails nevershow
          SilentInstall silent
          SetCompressor /SOLID lzma
          Section
            SetOutPath "$TEMP\astrbot_app"
            File /r "build\windows\x64\runner\Release\*"
            Exec "$TEMP\astrbot_app\astrbot_app.exe"
          SectionEnd
          '@ | Set-Content -Path sfx.nsi -Encoding ASCII
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Build self-extracting exe
        shell: pwsh
        run: |
          $mk = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $mk)) { $mk = "${env:ProgramFiles}\NSIS\makensis.exe" }
          if (-not (Test-Path $mk)) { throw "makensis still not found after choco install" }
          & $mk sfx.nsi
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: astrbot-windows.exe
          token: ${{ secrets.GITHUB_TOKEN }}
